<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>顶部导航栏</title>

        .navbar {
            background-color: #6b6a6a; /* 灰色背景 */
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;

            margin: 0;

        }

    <div class="navbar">
        <h1>Tlias智能学习辅助系统</h1>
